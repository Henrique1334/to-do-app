            return Math.max(1, Math.ceil(filteredTasks.length / TASKS_PER_PAGE));
        }

        // Função para atualizar controles de paginação
        function updatePaginationControls(filter = 'all') {
            const totalPages = getTotalPages(filter);
            const filteredTasks = getFilteredTasks(filter);

            // Resetar página se necessário
            if (currentPage > totalPages) {
                currentPage = totalPages;
            }

            // Atualizar info de página
            pageInfo.textContent = `Página ${currentPage} de ${totalPages}`;
            itemsInfo.textContent = `${filteredTasks.length} ${filteredTasks.length === 1 ? 'tarefa' : 'tarefas'}`;

            // Atualizar botões Anterior/Próxima
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            // Gerar botões de página
            paginationNav.innerHTML = '';
            if (totalPages <= 1) {
                // Não mostrar paginação se houver apenas uma página
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'block';
                nextBtn.style.display = 'block';

                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                    btn.textContent = i;
                    btn.disabled = i === currentPage;

                    btn.addEventListener('click', () => {
                        currentPage = i;
                        renderTasks(filter);
                        // Scroll para o topo da lista
                        document.querySelector('.task-list-wrapper').scrollTop = 0;
                    });

                    paginationNav.appendChild(btn);
                }
            }
        }

        // Função para atualizar as estatísticas das tarefas
        function updateStats() {
            const total = tasks.length;
            const pending = tasks.filter(task => !task.completed).length;
            const completed = tasks.filter(task => task.completed).length;

            totalTasksEl.textContent = `Total: ${total}`;
            pendingTasksEl.textContent = `Pendentes: ${pending}`;
            completedTasksEl.textContent = `Concluídas: ${completed}`;

            // Mostrar/esconder botão de limpar concluídas
            const clearBtn = document.getElementById('clear-completed');
            if (clearBtn) {
                clearBtn.style.display = completed > 0 ? 'block' : 'none';
            }
        }

        // Função para renderizar tarefas na tela com filtro opcional
        function renderTasks(filter = 'all') {
            const searchTerm = searchInput ? searchInput.value.toLowerCase().trim() : '';
            taskList.innerHTML = '';
            let filteredTasks = getFilteredTasks(filter);

            // Atualizar página atual
            currentFilter = filter;

            // Calcular índices para paginação
            const startIndex = (currentPage - 1) * TASKS_PER_PAGE;
            const endIndex = startIndex + TASKS_PER_PAGE;
            const paginatedTasks = filteredTasks.slice(startIndex, endIndex);

            // Renderizar cada tarefa na página atual
            paginatedTasks.forEach((task) => {
                const originalIndex = tasks.indexOf(task);
                const li = document.createElement('li');
                li.className = `task-item urgency-${task.urgency}${task.completed ? ' completed' : ''}`;

                li.innerHTML = `
                    <input type="checkbox" class="check-btn" ${task.completed ? 'checked' : ''}>
                    <span class="priority-icon">${getPriorityIcon(task.urgency)}</span>
                    <span class="task-text">${task.text}</span>
                    <span class="badge urgency-${task.urgency}">${task.urgency}</span>
                    <span class="task-date">${formatDateTime(task.createdAt)}</span>
                    <button class="delete-btn" data-original-index="${originalIndex}">×</button>
                `;

                // Evento para marcar/desmarcar tarefa como concluída
                const checkbox = li.querySelector('.check-btn');
                checkbox.addEventListener('change', () => {
                    task.completed = checkbox.checked;
                    saveTasks();
                    updateStats();
                    renderTasks(getCurrentFilter());
                });

                // Evento para deletar tarefa
                const deleteBtn = li.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', () => {
                    const index = parseInt(deleteBtn.dataset.originalIndex);
                    tasks.splice(index, 1);
                    saveTasks();
                    renderTasks(getCurrentFilter());
                });

                // Evento para editar tarefa (duplo clique)
                li.addEventListener('dblclick', () => {
                    editTask(task, originalIndex);
                });

                taskList.appendChild(li);
            });

            // Estado vazio quando não há tarefas
            if (filteredTasks.length === 0) {
                const emptyState = document.createElement('div');
                emptyState.className = 'empty-state';
                emptyState.innerHTML = `
                    <h3>Nenhuma tarefa encontrada</h3>
                    <p>${searchTerm ? 'Tente ajustar sua pesquisa ou filtro.' : 'Que tal adicionar sua primeira tarefa?'}</p>
                `;
                taskList.appendChild(emptyState);
            }

            // Atualizar controles de paginação
            updatePaginationControls(filter);

            // Atualizar estatísticas
            updateStats();
        }

        // Função para editar tarefa
        function editTask(task, index) {
            const newText = prompt('Editar tarefa:', task.text);
            if (newText && newText.trim() !== '' && newText.trim() !== task.text) {
                const trimmedText = newText.trim();

                // Verificar duplicatas
                const duplicate = tasks.find((t, i) => i !== index && t.text.toLowerCase() === trimmedText.toLowerCase());
                if (duplicate) {
                    showNotification('Esta tarefa já existe!', 'warning');
                    return;
                }

                task.text = trimmedText;
                saveTasks();
                renderTasks(getCurrentFilter());
                showNotification('Tarefa editada com sucesso!', 'success');
            }
        }
    </script>
</body>
</html>
